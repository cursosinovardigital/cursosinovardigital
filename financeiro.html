<script>
    const SUPABASE_URL = 'https://onsbuazkqfehkudhladt.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uc2J1YXprcWZlaGt1ZGhsYWR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNTI5OTgsImV4cCI6MjA5MzkyODk5OH0.ZypL6LHbPC_z971EDCTh6pVoA7g4qM6hWSWfWVO9a-M';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function init() {
        const { data: vendas } = await _supabase.from('vendas').select('*').order('created_at', { ascending: false });
        
        if (vendas && vendas.length > 0) {
            // Atualiza o que já está funcionando
            const liquidoTotal = vendas.reduce((acc, v) => acc + (v.valor_liquido || 0), 0);
            document.getElementById('saldo-liquido').innerText = liquidoTotal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('vendas-count').innerText = vendas.length;
            
            const cards = document.querySelectorAll('.card-stat h2');
            if(cards[3]) cards[3].innerText = (liquidoTotal / vendas.length).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

            // Renderiza o gráfico com um pequeno "fôlego" para o navegador
            setTimeout(() => carregarGrafico(vendas), 300);
        }
    }

    function carregarGrafico(vendas) {
        const labels = [];
        const dados = [];

        for (let i = 6; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            labels.push(d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' }).replace('.', ''));

            const soma = vendas
                .filter(v => new Date(v.created_at).toLocaleDateString('pt-BR') === d.toLocaleDateString('pt-BR'))
                .reduce((acc, v) => acc + (v.valor_liquido || 0), 0);
            dados.push(soma);
        }

        const ctx = document.getElementById('financeChart');
        if (!ctx) return;

        if (window.myChart) window.myChart.destroy();
        
        window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Faturamento',
                    data: dados,
                    borderColor: '#FF6600',
                    borderWidth: 4,
                    pointRadius: 6,
                    backgroundColor: 'rgba(255, 102, 0, 0.1)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, ticks: { callback: (v) => 'R$ ' + v } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    // Garante que o script rode após o carregamento total da janela
    window.addEventListener('load', init);
</script>
</body>
</html>
