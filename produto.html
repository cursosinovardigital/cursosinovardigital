<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produto | Inovar Digital</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet">

<style>

:root{
--primary:#FF6B00;
--primary-soft:#FFF4EC;
--bg:#F4F7FB;
--card:#FFFFFF;
--text:#0F172A;
--text2:#64748B;
--border:#E2E8F0;
--success:#10B981;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(to bottom,#F8FAFC,#EEF2F7);
color:var(--text);
}

.topbar{
width:100%;
height:82px;
background:rgba(255,255,255,.78);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(255,255,255,.7);

display:flex;
align-items:center;
justify-content:center;

position:sticky;
top:0;
z-index:999;
}

.topbar-content{
width:92%;
max-width:1280px;

display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
font-size:30px;
font-weight:900;
letter-spacing:-1px;
}

.logo span{
color:var(--primary);
}

.marketplace-badge{
background:white;
border:1px solid var(--border);

padding:12px 18px;

border-radius:999px;

font-size:13px;
font-weight:800;

box-shadow:0 4px 12px rgba(0,0,0,.04);
}

.container{
width:92%;
max-width:1280px;

margin:40px auto;

display:grid;
grid-template-columns:1.15fr .85fr;

gap:32px;
}

.left{
display:flex;
flex-direction:column;
gap:28px;
}

.card{
background:rgba(255,255,255,.88);

backdrop-filter:blur(12px);

border-radius:32px;

padding:34px;

border:1px solid rgba(255,255,255,.7);

box-shadow:
0 10px 40px rgba(15,23,42,.05),
0 2px 10px rgba(15,23,42,.04);
}
 .hero{
display:grid;
grid-template-columns:320px 1fr;
gap:32px;
align-items:center;
}

.product-cover{
width:100%;
height:420px;

border-radius:30px;

overflow:hidden;

background:#E5E7EB;

box-shadow:
0 25px 50px rgba(15,23,42,.12),
0 10px 25px rgba(15,23,42,.08);

transition:.35s;
}

.product-cover:hover{
transform:translateY(-4px) scale(1.01);
}

.product-cover img{
width:100%;
height:100%;
object-fit:cover;
}

.product-tag{
display:inline-flex;
align-items:center;
gap:10px;

background:var(--primary-soft);
color:var(--primary);

padding:12px 16px;

border-radius:999px;

font-size:13px;
font-weight:800;

margin-bottom:18px;
}

.hero h1{
font-size:54px;
line-height:1;

letter-spacing:-2px;

margin-bottom:18px;
}

.hero-description{
font-size:16px;
line-height:1.8;

color:var(--text2);

margin-bottom:28px;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
}

.stat{
background:#F8FAFC;
border:1px solid var(--border);

border-radius:24px;

padding:22px;
}

.stat-label{
font-size:13px;
color:var(--text2);

margin-bottom:10px;

font-weight:700;
}

.stat-value{
font-size:26px;
font-weight:900;

letter-spacing:-1px;
}

@media(max-width:980px){

.hero{
grid-template-columns:1fr;
}

.product-cover{
height:340px;
}

.hero h1{
font-size:38px;
}

.stats{
grid-template-columns:1fr;
}

}

@media(max-width:980px){

.container{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="topbar">

<div class="topbar-content">

<div class="logo">
Inovar <span>Digital</span>
</div>

<div class="marketplace-badge">
<i class="fas fa-fire"></i>
 Produto em alta
</div>

</div>

</div>

<div class="container">

<div class="left">

<div class="card hero">

<div class="product-cover">

<img id="produto_capa"
src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200&auto=format&fit=crop">

</div>

<div>

<div class="product-tag">

<i class="fas fa-chart-line"></i>

Produto premium

</div>

<h1 id="produto_nome">
Carregando...
</h1>

<div class="hero-description">

Aprenda estratégias modernas de vendas,
tráfego e escala com um método validado
por especialistas do mercado digital.

</div>

<div class="stats">

<div class="stat">

<div class="stat-label">
Conversão
</div>

<div class="stat-value">
8.7%
</div>

</div>

<div class="stat">

<div class="stat-label">
EPC
</div>

<div class="stat-value">
R$ 4,92
</div>

</div>

<div class="stat">

<div class="stat-label">
Comissão
</div>

<div class="stat-value" id="produto_comissao">
R$ 0
</div>

</div>

</div>

</div>

</div>

<div class="card">

BLOCO BENEFÍCIOS

</div>

<div class="card">

BLOCO MÓDULOS

</div>

</div>

<div class="right">

<div class="card">

SIDEBAR CTA

</div>

</div>

</div>

</body>
</html>
