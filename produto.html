<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Produto | Inovar Digital</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
rel="stylesheet">

<style>

:root{
--primary:#FF6B00;
--primary-soft:#FFF4EC;
--bg:#F4F7FB;
--card:#FFFFFF;
--text:#0F172A;
--text2:#64748B;
--border:#E2E8F0;
--success:#10B981;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:linear-gradient(to bottom,#F8FAFC,#EEF2F7);
color:var(--text);
}

.topbar{
width:100%;
height:82px;
background:rgba(255,255,255,.78);
backdrop-filter:blur(18px);
border-bottom:1px solid rgba(255,255,255,.7);

display:flex;
align-items:center;
justify-content:center;

position:sticky;
top:0;
z-index:999;
}

.topbar-content{
width:92%;
max-width:1280px;

display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
font-size:30px;
font-weight:900;
letter-spacing:-1px;
}

.logo span{
color:var(--primary);
}

.marketplace-badge{
background:white;
border:1px solid var(--border);

padding:12px 18px;

border-radius:999px;

font-size:13px;
font-weight:800;

box-shadow:0 4px 12px rgba(0,0,0,.04);
}

.container{
width:92%;
max-width:1280px;

margin:40px auto;

display:grid;
grid-template-columns:1.15fr .85fr;

gap:32px;
}

.left{
display:flex;
flex-direction:column;
gap:28px;
}

.card{
background:rgba(255,255,255,.88);

backdrop-filter:blur(12px);

border-radius:32px;

padding:34px;

border:1px solid rgba(255,255,255,.7);

box-shadow:
0 10px 40px rgba(15,23,42,.05),
0 2px 10px rgba(15,23,42,.04);
}

@media(max-width:980px){

.container{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<div class="topbar">

<div class="topbar-content">

<div class="logo">
Inovar <span>Digital</span>
</div>

<div class="marketplace-badge">
<i class="fas fa-fire"></i>
 Produto em alta
</div>

</div>

</div>

<div class="container">

<div class="left">

<div class="card">

BLOCO HERO

</div>

<div class="card">

BLOCO BENEFÍCIOS

</div>

<div class="card">

BLOCO MÓDULOS

</div>

</div>

<div class="right">

<div class="card">

SIDEBAR CTA

</div>

</div>

</div>

</body>
</html>
