<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maestro Hub | Modo Produtor</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --orange: #FF6600; --deep-black: #0A0C0E; --card-bg: #161B22; 
            --white: #FFFFFF; --text-dim: #8B949E; --border: #30363D;
            --purple-kiwi: #5D5FEF; --glow: rgba(255, 102, 0, 0.3);
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.3s; }
        body { margin: 0; background: var(--deep-black); color: var(--white); overflow-x: hidden; }

        /* HEADER DARK PREMIUM */
        header { 
            height: 80px; background: rgba(10, 12, 14, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; 
            align-items: center; padding: 0 50px; position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 22px; font-weight: 900; color: var(--white); text-decoration: none; display: flex; align-items: center; gap: 12px; }
        .logo span { color: var(--orange); text-shadow: 0 0 15px var(--glow); }

        .container { max-width: 1300px; margin: 40px auto; padding: 0 20px; padding-bottom: 100px; }

        /* ÁREA DE UPLOAD GLASS */
        .upload-section { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; 
            padding: 40px; margin-bottom: 50px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: grid; grid-template-columns: 1.2fr 1fr; gap: 40px;
        }
        .section-title { font-size: 24px; font-weight: 800; margin-bottom: 25px; display: flex; align-items: center; gap: 15px; }
        .section-title i { color: var(--orange); }

        .video-drop-zone { 
            background: #000; border: 2px dashed var(--orange); border-radius: 15px; 
            aspect-ratio: 16/9; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; position: relative; overflow: hidden; cursor: pointer;
        }
        .video-drop-zone:hover { background: rgba(255, 102, 0, 0.05); }
        .video-drop-zone video { width: 100%; height: 100%; object-fit: cover; }

        /* INPUTS PREMIUM */
        .form-group { margin-bottom: 20px; }
        .form-group label { font-size: 11px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; display: block; }
        .form-input { 
            width: 100%; background: #0D1117; border: 1px solid var(--border); 
            border-radius: 10px; padding: 15px; color: white; outline: none; font-size: 15px;
        }
        .form-input:focus { border-color: var(--orange); box-shadow: 0 0 10px var(--glow); }

        /* GRADE 3x3 REFINADA */
        .video-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; 
        }
        .video-card { 
            background: var(--card-bg); border: 1px solid var(--border); border-radius: 15px; 
            overflow: hidden; position: relative;
        }
        .video-card:hover { transform: translateY(-10px); border-color: var(--orange); box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
        
        .thumb-wrap { width: 100%; aspect-ratio: 16/9; background: #000; position: relative; }
        .play-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.4);
            opacity: 0;
        }
        .video-card:hover .play-overlay { opacity: 1; }
        .play-overlay i { font-size: 40px; color: var(--orange); }

        .card-body { padding: 20px; }
        .card-tag { font-size: 10px; font-weight: 900; color: var(--orange); background: rgba(255, 102, 0, 0.1); padding: 4px 10px; border-radius: 5px; margin-bottom: 10px; display: inline-block; }
        .card-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
        .card-desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; }

        /* BOTÕES */
        .btn-orange { 
            background: var(--orange); color: white; border: none; padding: 15px 30px; 
            border-radius: 10px; font-weight: 800; cursor: pointer; display: flex; 
            align-items: center; gap: 10px; justify-content: center;
        }
        .btn-orange:hover { box-shadow: 0 0 20px var(--orange); transform: scale(1.02); }

        .btn-outline { 
            background: transparent; border: 1px solid var(--border); color: white; 
            padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer;
        }
        .btn-outline:hover { border-color: var(--orange); color: var(--orange); }

    </style>
</head>
<body>

<header>
    <a href="portal.html" class="logo"><i class="fas fa-rocket" style="color: var(--orange);"></i> MAESTRO<span>HUB</span></a>
    <div style="display: flex; gap: 20px;">
        <button class="btn-outline" onclick="window.location.href='portal.html'">Dashboard</button>
        <button class="btn-orange" style="padding: 10px 20px; font-size: 13px;">Publicar Produto</button>
    </div>
</header>

<div class="container">
    
    <div class="section-title"><i class="fas fa-terminal"></i> Estúdio de Criação</div>

    <div class="upload-section">
        <div class="left">
            <div class="video-drop-zone" id="drop-zone" onclick="document.getElementById('file-video').click()">
                <div id="placeholder">
                    <i class="fas fa-clapperboard fa-3x" style="color: var(--orange); margin-bottom: 15px;"></i>
                    <p style="font-weight: 700;">Arraste o vídeo da aula</p>
                    <p style="font-size: 12px; color: var(--text-dim);">MP4, MOV ou WebM (Max 2GB)</p>
                </div>
                <video id="preview-player" controls style="display: none;"></video>
                <input type="file" id="file-video" hidden accept="video/*">
            </div>
        </div>

        <div class="right">
            <div class="form-group">
                <label>Título da Aula</label>
                <input type="text" id="class-title" class="form-input" placeholder="Ex: Dominando as Escalas Maiores">
            </div>
            <div class="form-group">
                <label>Descrição do Conteúdo</label>
                <textarea id="class-desc" class="form-input" style="height: 100px; resize: none;" placeholder="Descreva os tópicos abordados nesta aula..."></textarea>
            </div>
            <button class="btn-orange" style="width: 100%;" onclick="adicionarAula()">
                <i class="fas fa-plus"></i> Adicionar Aula à Grade
            </button>
        </div>
    </div>

    <div class="section-title"><i class="fas fa-th-large"></i> Grade de Conteúdo <span style="font-size: 14px; color: var(--text-dim); margin-left: 10px;">(Visualização do Aluno)</span></div>
    
    <div class="video-grid" id="main-grid">
        <div class="video-card">
            <div class="thumb-wrap">
                <div class="play-overlay"><i class="fas fa-play-circle"></i></div>
            </div>
            <div class="card-body">
                <span class="card-tag">MÓDULO 01</span>
                <div class="card-title">Boas-vindas ao Maestro Hub</div>
                <div class="card-desc">Conheça as funcionalidades básicas e como navegar na plataforma.</div>
            </div>
        </div>
    </div>

</div>

<script>
    const fileInput = document.getElementById('file-video');
    const player = document.getElementById('preview-player');
    const placeholder = document.getElementById('placeholder');

    fileInput.onchange = function() {
        const file = this.files[0];
        if (file) {
            const url = URL.createObjectURL(file);
            player.src = url;
            player.style.display = 'block';
            placeholder.style.display = 'none';
        }
    }

    function adicionarAula() {
        const title = document.getElementById('class-title').value;
        const desc = document.getElementById('class-desc').value;
        const grid = document.getElementById('main-grid');

        if(!title) return alert("Defina um título!");

        const card = document.createElement('div');
        card.className = 'video-card';
        card.innerHTML = `
            <div class="thumb-wrap">
                <video src="${player.src}" style="width:100%; height:100%; object-fit:cover;"></video>
                <div class="play-overlay"><i class="fas fa-play-circle"></i></div>
            </div>
            <div class="card-body">
                <span class="card-tag">NOVA AULA</span>
                <div class="card-title">${title}</div>
                <div class="card-desc">${desc}</div>
            </div>
        `;
        grid.appendChild(card);
        
        // Reset
        document.getElementById('class-title').value = '';
        document.getElementById('class-desc').value = '';
        player.style.display = 'none';
        placeholder.style.display = 'flex';
        alert("Aula adicionada com sucesso!");
    }
</script>

</body>
</html>
