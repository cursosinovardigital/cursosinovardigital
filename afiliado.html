<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Afiliado | Inovar Digital</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --orange: #FF6600; 
            --dark: #111418; 
            --bg: #F4F7FA; 
            --border: #E2E8F0; 
            --green: #22C55E;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        nav { width: 260px; background: var(--dark); color: white; padding: 30px 20px; display: flex; flex-direction: column; gap: 10px; }
        .logo { font-size: 20px; font-weight: 900; margin-bottom: 30px; color: white; text-decoration: none; }
        .logo span { color: var(--orange); }
        .nav-item { padding: 12px 15px; cursor: pointer; display: flex; align-items: center; gap: 12px; border-radius: 8px; color: #A0AEC0; text-decoration: none; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: #1E2228; color: white; }
        .nav-item.active { border-left: 4px solid var(--orange); }

        /* Main Content */
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* Stats */
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .stat-label { font-size: 12px; color: #718096; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 32px; font-weight: 800; margin-top: 10px; color: var(--dark); }
        
        /* Link Box */
        .link-section { background: white; padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 30px; }
        .link-container { display: flex; gap: 10px; margin-top: 15px; }
        .link-input { flex: 1; padding: 12px 15px; border: 1px solid var(--border); border-radius: 8px; background: #F8F9FA; font-size: 14px; color: #4A5568; outline: none; }
        .btn-copy { background: var(--orange); color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        /* Table */
        .table-container { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 15px; background: #F8F9FA; font-size: 11px; color: #718096; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; color: #4A5568; }
        .badge-paga { background: #DCFCE7; color: #166534; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo"><i class="fas fa-rocket"></i> Inovar<span>Digital</span></a>
    <div class="nav-item active"><i class="fas fa-home"></i> Dashboard</div>
    <div class="nav-item"><i class="fas fa-link"></i> Meus Links</div>
    <div class="nav-item"><i class="fas fa-wallet"></i> Financeiro</div>
    <div class="nav-item"><i class="fas fa-user"></i> Meu Perfil</div>
</nav>

<main>
    <div class="header-flex">
        <h1 style="font-weight: 800; margin:0;">Olá, <span id="afiliado-user">Parceiro</span> 🚀</h1>
        <div style="color: #718096; font-weight: 600;">ID: <span id="afiliado-id-display">--</span></div>
    </div>

    <div class="link-section">
        <div class="stat-label">Seu Link de Divulgação (Principal)</div>
        <div class="link-container">
            <input type="text" id="ipt-link" class="link-input" readonly value="Carregando link...">
            <button class="btn-copy" onclick="copyLink()">COPIAR</button>
        </div>
    </div>

    <div class="card-grid">
        <div class="stat-card">
            <div class="stat-label">Saldo Disponível</div>
            <div class="stat-value" style="color: var(--green)" id="saldo-afiliado">R$ 0,00</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total de Vendas</div>
            <div class="stat-value" id="vendas-count">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Cliques no Link</div>
            <div class="stat-value" style="color: #5D5FEF">--</div>
        </div>
    </div>

    <h3 style="font-weight: 800; margin-bottom: 20px;">Vendas Recentes</h3>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Produto</th>
                    <th>Valor Venda</th>
                    <th>Minha Comissão</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="vendas-afiliado-body">
                <tr><td colspan="5" style="text-align:center; padding:30px;">Buscando suas vendas...</td></tr>
            </tbody>
        </table>
    </div>
</main>

<script>
    const SUPABASE_URL = 'https://onsbuazkqfehkudhladt.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uc2J1YXprcWZlaGt1ZGhsYWR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNTI5OTgsImV4cCI6MjA5MzkyODk5OH0.ZypL6LHbPC_z971EDCTh6pVoA7g4qM6hWSWfWVO9a-M';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Identificador único do afiliado para o teste
    const AFILIADO_ATUAL = 'teste_vitor'; 

    async function initAfiliado() {
        document.getElementById('afiliado-user').innerText = AFILIADO_ATUAL;
        document.getElementById('afiliado-id-display').innerText = AFILIADO_ATUAL;
        
        // Monta um link de exemplo com o primeiro produto do banco
        const { data: prod } = await _supabase.from('produtos').select('id').limit(1).single();
        if(prod) {
            const meuLink = `https://cursosinovardigital.github.io/cursosinovardigital/pay.html?id=${prod.id}&af=${AFILIADO_ATUAL}`;
            document.getElementById('ipt-link').value = meuLink;
        }

        carregarVendasAfiliado();
    }

    async function carregarVendasAfiliado() {
        // Busca vendas onde o afiliado_id seja igual ao dele
        const { data: vendas, error } = await _supabase
            .from('vendas')
            .select('*, produtos(nome, comissao_afiliado)')
            .eq('afiliado_id', AFILIADO_ATUAL)
            .order('created_at', { ascending: false });

        if(error || !vendas) return;

        let saldoTotal = 0;

        const html = vendas.map(v => {
            // Calcula a comissão baseada na % que você definiu no portal
            const porcComissao = v.produtos?.comissao_afiliado || 0;
            const valorComissao = (v.valor_total * porcComissao) / 100;
            
            if(v.status === 'Paga') saldoTotal += valorComissao;

            return `
                <tr>
                    <td>${new Date(v.created_at).toLocaleDateString('pt-BR')}</td>
                    <td style="font-weight:700;">${v.produtos?.nome || 'Produto'}</td>
                    <td>R$ ${parseFloat(v.valor_total).toFixed(2).replace('.',',')}</td>
                    <td style="color: var(--orange); font-weight:700;">R$ ${valorComissao.toFixed(2).replace('.',',')}</td>
                    <td><span class="badge-paga">${v.status}</span></td>
                </tr>
            `;
        }).join('');

        document.getElementById('vendas-afiliado-body').innerHTML = html || '<tr><td colspan="5" style="text-align:center;">Nenhuma venda encontrada ainda.</td></tr>';
        document.getElementById('vendas-count').innerText = vendas.length;
        document.getElementById('saldo-afiliado').innerText = `R$ ${saldoTotal.toFixed(2).replace('.',',')}`;
    }

    function copyLink() {
        const copyText = document.getElementById("ipt-link");
        copyText.select();
        navigator.clipboard.writeText(copyText.value);
        alert("Link de afiliado copiado! Divulgue e ganhe comissões.");
    }

    window.onload = initAfiliado;
</script>
</body>
</html>
