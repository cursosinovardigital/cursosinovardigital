<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso | Inovar Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --hot-orange: #ff4000;
            --hot-bg: #f5f3ef;
            --text-dark: #053d4e;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--hot-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--text-dark);
        }
        .login-card {
            background: #fff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo { 
            font-weight: 900; 
            font-size: 1.8rem; 
            margin-bottom: 30px; 
            color: #000;
            letter-spacing: -1px;
        }
        .logo span { color: var(--hot-orange); }
        
        h2 { font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; color: #111; }
        p { color: #6b7280; margin-bottom: 30px; font-size: 0.9rem; }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        input:focus { border-color: var(--hot-orange); }

        .btn-login {
            width: 100%;
            background: var(--hot-orange);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        .btn-login:hover { filter: brightness(1.1); transform: translateY(-2px); }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #9ca3af;
            font-size: 0.8rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e5e7eb;
        }
        .divider:not(:empty)::before { margin-right: .5em; }
        .divider:not(:empty)::after { margin-left: .5em; }

        .btn-google {
            width: 100%;
            background: #fff;
            color: #444;
            border: 1px solid #d1d5db;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-google:hover { background: #f9fafb; border-color: #9ca3af; }
        
        .footer-links { margin-top: 25px; font-size: 0.85rem; color: #6b7280; }
        .footer-links a { color: var(--hot-orange); text-decoration: none; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo">inovar<span>digital</span></div>
    <h2 id="auth-title">Boas-vindas!</h2>
    <p id="auth-desc">Acesse sua conta para gerenciar seus negócios.</p>
    
    <form id="authForm">
        <input type="email" id="email" placeholder="E-mail" required>
        <input type="password" id="password" placeholder="Senha" required>
        <button type="submit" id="btn-submit" class="btn-login">Entrar</button>
    </form>

    <div class="divider">ou</div>

    <button type="button" onclick="loginComGoogle()" class="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google">
        Entrar com Google
    </button>

    <div class="footer-links">
        <span id="toggle-text">Ainda não tem conta?</span> <a onclick="toggleAuth()" id="toggle-link">Criar conta</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://onsbuazkqfehkudhladt.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uc2J1YXprcWZlaGt1ZGhsYWR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNTI5OTgsImV4cCI6MjA5MzkyODk5OH0.ZypL6LHbPC_z971EDCTh6pVoA7g4qM6hWSWfWVO9a-M';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isLogin = true;

    function toggleAuth() {
        isLogin = !isLogin;
        const title = document.getElementById('auth-title');
        const desc = document.getElementById('auth-desc');
        const btnSubmit = document.getElementById('btn-submit');
        const toggleText = document.getElementById('toggle-text');
        const toggleLink = document.getElementById('toggle-link');

        if (isLogin) {
            title.innerText = 'Boas-vindas!';
            desc.innerText = 'Acesse sua conta para gerenciar seus negócios.';
            btnSubmit.innerText = 'Entrar';
            toggleText.innerText = 'Ainda não tem conta?';
            toggleLink.innerText = 'Criar conta';
        } else {
            title.innerText = 'Crie sua conta';
            desc.innerText = 'Cadastre-se gratuitamente para acessar o conteúdo.';
            btnSubmit.innerText = 'Cadastrar';
            toggleText.innerText = 'Já possui conta?';
            toggleLink.innerText = 'Fazer login';
        }
    }

    async function loginComGoogle() {
        const { error } = await _supabase.auth.signInWithOAuth({
            provider: 'google',
            options: { 
                // AQUI RESOLVE O ERRO: Substitua pela URL do seu GitHub Pages
                redirectTo: 'https://cursosinovardigital.github.io/cursosinovardigital/index.html' 
            }
        });
        if (error) alert('Erro: ' + error.message);
    }

    const authForm = document.getElementById('authForm');
    authForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        if (isLogin) {
            const { error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) alert('Erro no login: ' + error.message);
            else window.location.href = 'index.html';
        } else {
            const { error } = await _supabase.auth.signUp({ email, password });
            if (error) alert('Erro no cadastro: ' + error.message);
            else alert('Sucesso! Verifique seu e-mail para confirmar a conta.');
        }
    });
</script>

</body>
</html>
