<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inovar Digital | Dashboard</title>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00e676; /* Verde Kiwify */
            --bg: #0f172a;
            --sidebar: #1e293b;
            --text: #f8fafc;
            --card: #334155;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Menu Lateral Estilo Hotmart */
        nav { width: 260px; background: var(--sidebar); display: flex; flex-direction: column; padding: 20px; border-right: 1px solid #334155; }
        .logo { font-size: 22px; font-weight: bold; color: var(--primary); margin-bottom: 40px; text-align: center; }
        nav button { 
            background: none; border: none; color: #94a3b8; padding: 15px; text-align: left; 
            font-size: 16px; cursor: pointer; border-radius: 8px; transition: 0.3s; margin-bottom: 5px;
        }
        nav button i { margin-right: 10px; width: 20px; }
        nav button:hover, nav button.active { background: #334155; color: white; }
        nav button.active { color: var(--primary); }

        /* Área Principal */
        main { flex: 1; overflow-y: auto; padding: 40px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        /* Grid de Cards Estilo Marketplace */
        .grid-cursos { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { 
            background: var(--sidebar); border-radius: 12px; overflow: hidden; 
            transition: transform 0.3s; border: 1px solid #334155;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card-img { height: 160px; background: #475569; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .card-body { padding: 20px; }
        .card h3 { margin: 0 0 10px 0; font-size: 18px; }
        .card p { color: #94a3b8; font-size: 14px; height: 40px; overflow: hidden; }
        .price { font-size: 20px; font-weight: bold; color: var(--primary); margin: 15px 0; display: block; }
        
        .btn-buy { 
            background: var(--primary); color: #000; border: none; padding: 12px; 
            width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-buy:hover { opacity: 0.9; }

        /* Formulário do Produtor */
        .form-box { background: var(--sidebar); padding: 30px; border-radius: 15px; max-width: 600px; }
        input, textarea { 
            width: 100%; background: #0f172a; border: 1px solid #334155; 
            padding: 12px; color: white; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box;
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">INOVAR DIGITAL</div>
    <button class="active" onclick="mudarAba('vitrine', this)"><i class="fas fa-shopping-cart"></i> Marketplace</button>
    <button onclick="mudarAba('meus-cursos', this)"><i class="fas fa-play-circle"></i> Área de Membros</button>
    <button onclick="mudarAba('vendas', this)"><i class="fas fa-chart-line"></i> Minhas Vendas</button>
    <button onclick="mudarAba('produtor', this)"><i class="fas fa-plus-circle"></i> Criar Produto</button>
</nav>

<main>
    <header>
        <h2 id="titulo-pagina">Mais vendidos do Marketplace</h2>
        <div id="user-info">Víctor Soati Ávila... <i class="fas fa-chevron-down"></i></div>
    </header>

    <section id="aba-vitrine" class="aba">
        <div id="vitrine-lista" class="grid-cursos"></div>
    </section>

    <section id="aba-meus-cursos" class="aba" style="display:none;">
        <div id="aluno-lista" class="grid-cursos"></div>
    </section>

    <section id="aba-produtor" class="aba" style="display:none;">
        <div class="form-box">
            <h3>Novo Produto</h3>
            <input type="text" id="p-nome" placeholder="Nome do Curso">
            <textarea id="p-desc" placeholder="O que o aluno vai aprender?"></textarea>
            <input type="number" id="p-preco" placeholder="Valor (R$)">
            <input type="text" id="p-link" placeholder="Link de Checkout Mercado Pago">
            <button class="btn-buy" onclick="api_criarCurso()">Salvar e Publicar</button>
        </div>
    </section>
</main>

<script>
    const mp = new MercadoPago('APP_USR-50665ab5-8c5c-4b1b-9f9b-2e708b8fbb50');

    function mudarAba(aba, btn) {
        document.querySelectorAll('.aba').forEach(el => el.style.display = 'none');
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById('aba-' + aba).style.display = 'block';
        btn.classList.add('active');
        
        if(aba === 'vitrine') carregarVitrine();
        if(aba === 'meus-cursos') carregarAreaAluno();
    }

    async function carregarVitrine() {
        const { data: cursos } = await _supabase.from('cursos_disponiveis').select('*');
        const container = document.getElementById('vitrine-lista');
        container.innerHTML = cursos.map(c => `
            <div class="card">
                <div class="card-img"><i class="fas fa-graduation-cap"></i></div>
                <div class="card-body">
                    <h3>${c.nome}</h3>
                    <p>${c.descricao}</p>
                    <span class="price">R$ ${c.preco}</span>
                    <button class="btn-buy" onclick="comprar('${c.nome}', '${c.link_pagamento}')">Promover agora</button>
                </div>
            </div>
        `).join('');
    }

    async function comprar(nome, link) {
        const { data: { session } } = await _supabase.auth.getSession();
        if(!session) return alert("Logue primeiro!");
        window.location.href = `${link}?external_reference=${session.user.id}&reason=${encodeURIComponent(nome)}`;
    }

    async function carregarAreaAluno() {
        const { data: { session } } = await _supabase.auth.getSession();
        const { data: matriculas } = await _supabase.from('matriculas').select('*').eq('user_id', session.user.id);
        const container = document.getElementById('aluno-lista');
        container.innerHTML = matriculas?.map(m => `
            <div class="card" style="border-color: var(--primary)">
                <div class="card-img"><i class="fas fa-play"></i></div>
                <div class="card-body">
                    <h3>${m.curso_id}</h3>
                    <button class="btn-buy" style="background:#475569; color:white">Acessar Conteúdo</button>
                </div>
            </div>
        `).join('') || '<p>Nenhum curso ainda.</p>';
    }

    async function api_criarCurso() {
        const curso = {
            nome: document.getElementById('p-nome').value,
            descricao: document.getElementById('p-desc').value,
            preco: document.getElementById('p-preco').value,
            link_pagamento: document.getElementById('p-link').value
        };
        await _supabase.from('cursos_disponiveis').insert([curso]);
        alert("Curso lançado!");
        mudarAba('vitrine', document.querySelector('nav button'));
    }

    carregarVitrine();
</script>
</body>
</html>
