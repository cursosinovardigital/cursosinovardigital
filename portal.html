<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Aluno | Inovar Digital</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --hot-orange: #ff4000;
            --hot-bg: #f5f3ef;
            --text-dark: #053d4e;
            --sidebar-width: 260px;
            --white: #ffffff;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--hot-bg); color: var(--text-dark); margin: 0; display: flex; }

        /* SIDEBAR */
        aside { width: var(--sidebar-width); background: var(--text-dark); height: 100vh; position: fixed; color: white; padding: 30px 20px; box-sizing: border-box; display: flex; flex-direction: column; z-index: 100; }
        .sidebar-logo { font-weight: 900; font-size: 1.4rem; margin-bottom: 50px; letter-spacing: -1px; }
        .sidebar-logo span { color: var(--hot-orange); }

        nav.menu-lateral { flex-grow: 1; }
        nav.menu-lateral a { display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.7); text-decoration: none; padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; transition: 0.3s; font-weight: 500; }
        nav.menu-lateral a:hover, nav.menu-lateral a.active { background: rgba(255, 64, 0, 0.15); color: var(--hot-orange); }

        /* MAIN CONTENT */
        main { margin-left: var(--sidebar-width); width: calc(100% - var(--sidebar-width)); padding: 40px 5%; box-sizing: border-box; }
        header.portal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .welcome-text h1 { font-size: 1.8rem; font-weight: 800; margin: 0; }
        .user-stats { display: flex; gap: 20px; }
        .stat-card { background: white; padding: 15px 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .stat-card span { display: block; font-size: 1.2rem; font-weight: 800; color: var(--hot-orange); }

        /* GRID DE CURSOS */
        .section-title { font-size: 1.4rem; font-weight: 800; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
        .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        .course-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.04); transition: 0.3s; border: 1px solid transparent; }
        .course-card:hover { transform: translateY(-5px); border-color: var(--hot-orange); }
        .course-thumb { width: 100%; height: 160px; position: relative; }
        .course-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .course-content { padding: 20px; }
        .course-content h3 { font-size: 1.1rem; margin: 0; font-weight: 700; }
        .btn-play { background: var(--hot-orange); color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; margin-top: 15px; }

        /* LOADING SPINNER */
        #loading { text-align: center; padding: 50px; font-weight: 600; color: var(--hot-orange); }

        @media (max-width: 900px) {
            aside { width: 80px; padding: 20px 10px; }
            .sidebar-logo, nav.menu-lateral a span { display: none; }
            main { margin-left: 80px; width: calc(100% - 80px); }
        }
    </style>
</head>
<body>

    <aside>
        <div class="sidebar-logo">inovar<span>digital</span></div>
        <nav class="menu-lateral">
            <a href="#" class="active"><span>Dashboard</span></a>
            <a href="index.html"><span>Voltar ao Site</span></a>
        </nav>
        <nav class="menu-lateral" style="margin-top: auto;">
            <a href="#" onclick="logout()"><span>Sair</span></a>
        </nav>
    </aside>

    <main>
        <header class="portal-header">
            <div class="welcome-text">
                <h1>Olá, <span id="user-name">Aluno</span>! 👋</h1>
                <p>Aqui estão seus cursos liberados.</p>
            </div>
            <div class="user-stats">
                <div class="stat-card">
                    <span id="courses-count">0</span>
                    <label style="font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: #9ca3af;">Meus Cursos</label>
                </div>
            </div>
        </header>

        <h2 class="section-title">Seus Cursos</h2>
        <div id="loading">Carregando seus cursos...</div>
        <div class="courses-grid" id="courses-container">
            </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://onsbuazkqfehkudhladt.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uc2J1YXprcWZlaGt1ZGhsYWR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNTI5OTgsImV4cCI6MjA5MzkyODk5OH0.ZypL6LHbPC_z971EDCTh6pVoA7g4qM6hWSWfWVO9a-M';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // BANCO DE DADOS LOCAL DOS CURSOS (Você pode gerenciar por aqui por enquanto)
        const CATALOGO_CURSOS = {
            'marketing-digital': {
                titulo: 'Marketing Digital para Iniciantes 2026',
                img: 'https://img.youtube.com/vi/M7lc1UVf-VE/maxresdefault.jpg',
                link: 'aula.html?curso=marketing-digital'
            },
            'automacao-ia': {
                titulo: 'Automação de Vendas com IA',
                img: 'https://img.youtube.com/vi/u1GZ8K_J7_I/maxresdefault.jpg',
                link: 'aula.html?curso=automacao-ia'
            }
        };

        async function carregarPortal() {
            const { data: { session } } = await _supabase.auth.getSession();
            
            if (!session) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('user-name').innerText = session.user.email.split('@')[0];

            // BUSCA AS MATRÍCULAS DO ALUNO NO BANCO
            const { data: matriculas, error } = await _supabase
                .from('matriculas')
                .select('curso_id')
                .eq('user_id', session.user.id);

            const container = document.getElementById('courses-container');
            const loading = document.getElementById('loading');
            loading.style.display = 'none';

            if (matriculas && matriculas.length > 0) {
                document.getElementById('courses-count').innerText = matriculas.length;
                
                matriculas.forEach(item => {
                    const dadosCurso = CATALOGO_CURSOS[item.curso_id];
                    if (dadosCurso) {
                        container.innerHTML += `
                            <div class="course-card">
                                <div class="course-thumb"><img src="${dadosCurso.img}" alt="Thumb"></div>
                                <div class="course-content">
                                    <h3>${dadosCurso.titulo}</h3>
                                    <a href="${dadosCurso.link}" class="btn-play">▶</a>
                                </div>
                            </div>
                        `;
                    }
                });
            } else {
                container.innerHTML = `<p>Você ainda não possui cursos liberados. Explore a nossa loja!</p>`;
            }
        }

        async function logout() {
            await _supabase.auth.signOut();
            window.location.href = 'index.html';
        }

        carregarPortal();
    </script>
</body>
</html>
