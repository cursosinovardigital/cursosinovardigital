<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Inovar | Aluno e Produtor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <style>
        :root { --hot-orange: #ff4000; --hot-bg: #f5f3ef; --text-dark: #053d4e; --sidebar-width: 260px; }
        body { font-family: 'Inter', sans-serif; background-color: var(--hot-bg); color: var(--text-dark); margin: 0; display: flex; min-height: 100vh; }
        
        aside { width: var(--sidebar-width); background: var(--text-dark); height: 100vh; position: fixed; color: white; padding: 30px 20px; box-sizing: border-box; display: flex; flex-direction: column; z-index: 100; }
        .sidebar-logo { font-weight: 900; font-size: 1.4rem; margin-bottom: 40px; }
        .sidebar-logo span { color: var(--hot-orange); }

        nav.menu-lateral a { display: flex; align-items: center; gap: 12px; color: rgba(255,255,255,0.7); text-decoration: none; padding: 12px 15px; border-radius: 10px; margin-bottom: 8px; cursor: pointer; }
        nav.menu-lateral a:hover, nav.menu-lateral a.active { background: rgba(255, 64, 0, 0.15); color: var(--hot-orange); }

        main { margin-left: var(--sidebar-width); width: 100%; padding: 40px 5%; box-sizing: border-box; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        .section-title { font-size: 1.4rem; font-weight: 800; margin: 40px 0 20px; display: flex; align-items: center; gap: 10px; }
        .section-title span { color: var(--hot-orange); }

        .courses-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 160px; object-fit: cover; }
        .card-body { padding: 20px; }
        .btn-buy { background: #10b981; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .btn-play { background: var(--hot-orange); color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: 700; cursor: pointer; text-decoration: none; display: block; text-align: center; }
    </style>
</head>
<body>

    <aside>
        <div class="sidebar-logo">inovar<span>digital</span></div>
        <nav class="menu-lateral">
            <a onclick="showView('aluno')" id="nav-aluno" class="active">📚 <span>Área do Aluno</span></a>
            <a onclick="showView('produtor')" id="nav-produtor">🚀 <span>Modo Produtor</span></a>
            <a href="index.html">🏠 <span>Voltar ao Site</span></a>
        </nav>
    </aside>

    <main>
        <section id="view-aluno" class="view-section active">
            <h1>Olá, <span id="user-name">Aluno</span>! 👋</h1>
            
            <h2 class="section-title"><span>●</span> Meus Cursos</h2>
            <div class="courses-grid" id="meus-cursos-container">
                </div>

            <h2 class="section-title"><span>●</span> Vitrine de Oportunidades</h2>
            <div class="courses-grid" id="vitrine-container">
                </div>
        </section>

        </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const _supabase = supabase.createClient('https://onsbuazkqfehkudhladt.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uc2J1YXprcWZlaGt1ZGhsYWR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNTI5OTgsImV4cCI6MjA5MzkyODk5OH0.ZypL6LHbPC_z971EDCTh6pVoA7g4qM6hWSWfWVO9a-M');
        const mp = new MercadoPago('APP_USR-c966781c-16d3-4ebe-b401-c6d32b193297');

        async function carregarPortal() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (!session) { window.location.href = 'login.html'; return; }
            
            document.getElementById('user-name').innerText = session.user.email.split('@')[0];
            
            carregarCursosComprados(session.user.id);
            carregarVitrine();
        }

        async function carregarCursosComprados(userId) {
            const { data: matriculas } = await _supabase.from('matriculas').select('*').eq('user_id', userId);
            const container = document.getElementById('meus-cursos-container');
            container.innerHTML = matriculas?.length ? '' : '<p>Você ainda não possui cursos.</p>';
            
            matriculas?.forEach(m => {
                container.innerHTML += `
                    <div class="card">
                        <div class="card-body">
                            <h3>${m.curso_id}</h3>
                            <a href="aula.html?curso=${m.curso_id}" class="btn-play">Acessar Conteúdo</a>
                        </div>
                    </div>`;
            });
        }

        async function carregarVitrine() {
            const { data: cursos } = await _supabase.from('cursos_disponiveis').select('*');
            const container = document.getElementById('vitrine-container');
            container.innerHTML = '';

            cursos?.forEach(c => {
                container.innerHTML += `
                    <div class="card">
                        <img src="${c.capa_url || 'https://via.placeholder.com/300x160'}">
                        <div class="card-body">
                            <h3>${c.nome}</h3>
                            <p style="font-size:0.8rem; color:#666">${c.descricao}</p>
                            <div style="font-weight:800; font-size:1.1rem; margin: 10px 0;">R$ ${c.preco}</div>
                            <button class="btn-buy" onclick="abrirCheckout('${c.nome}', ${c.preco})">Comprar Agora</button>
                        </div>
                    </div>`;
            });
        }

        function abrirCheckout(nome, preco) {
            alert(`Você será redirecionado para o pagamento de ${nome} no valor de R$ ${preco}`);
            // Aqui entra a integração final do link de checkout do Mercado Pago
            window.open('https://link.mercadopago.com.br/INOVARDIGITAL_TESTE', '_blank');
        }

        carregarPortal();
    </script>
</body>
</html>
