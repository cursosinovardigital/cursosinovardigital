<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inovar Digital | Dashboard Pro</title>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --orange: #FF6600; --side-black: #111418; --white: #FFFFFF; 
            --bg: #F4F7FA; --text: #1A1D23; --border: #E2E8F0; 
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: all 0.2s; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }

        /* LOGO ESTILIZADA */
        .logo-area { padding: 30px 25px; border-bottom: 1px solid #2D3436; }
        .logo-text { font-size: 20px; font-weight: 900; color: var(--white); letter-spacing: -1px; }
        .logo-text span { color: var(--orange); }

        /* SIDEBAR */
        nav { width: 260px; background: var(--side-black); display: flex; flex-direction: column; flex-shrink: 0; }
        .nav-scroll { flex: 1; overflow-y: auto; padding: 10px 0; }
        .nav-item { 
            padding: 14px 25px; color: #A0AEC0; cursor: pointer; display: flex; 
            align-items: center; font-size: 14px; border-left: 4px solid transparent;
        }
        .nav-item i { margin-right: 15px; width: 18px; text-align: center; }
        .nav-item:hover, .nav-item.active { background: #1E2228; color: #FFF; border-left-color: var(--orange); }

        /* HEADER */
        main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        header { 
            height: 70px; background: var(--white); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center; padding: 0 40px;
        }

        .content-area { padding: 35px; overflow-y: auto; flex: 1; }
        .section { display: none; }
        .section.active { display: block; animation: fadeIn 0.3s ease; }

        /* CARDS */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { background: #FFF; border-radius: 12px; border: 1px solid var(--border); padding: 25px; }
        .btn-primary { 
            background: var(--orange); color: #FFF; border: none; padding: 12px 25px; 
            border-radius: 8px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px;
        }

        /* PAGINA DE EDIÇÃO DE PRODUTO (COMPLETA) */
        .editor-container { background: #FFF; border-radius: 15px; border: 1px solid var(--border); overflow: hidden; }
        .editor-header { padding: 25px; border-bottom: 1px solid var(--border); display: flex; gap: 20px; }
        .editor-tab { padding: 10px 20px; cursor: pointer; font-weight: 600; color: #718096; border-bottom: 3px solid transparent; }
        .editor-tab.active { color: var(--orange); border-bottom-color: var(--orange); }
        .editor-content { padding: 30px; }

        input, textarea, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 15px; background: #FAFAFA; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav>
    <div class="logo-area">
        <div class="logo-text">Inovar<span>Digital</span></div>
    </div>
    <div class="nav-scroll">
        <div class="nav-item active" onclick="ver('dash', this)"><i class="fas fa-chart-line"></i> Dashboard</div>
        <div class="nav-item" onclick="ver('prod', this)"><i class="fas fa-box"></i> Produtos</div>
        <div class="nav-item" onclick="ver('membro', this)"><i class="fas fa-play-circle"></i> Área de Membros</div>
        <div class="nav-item" onclick="ver('market', this)"><i class="fas fa-store"></i> Marketplace</div>
        <div class="nav-item" onclick="ver('vendas', this)"><i class="fas fa-dollar-sign"></i> Vendas</div>
        <div class="nav-item" onclick="ver('finan', this)"><i class="fas fa-wallet"></i> Financeiro</div>
        <div class="nav-item" onclick="ver('ajuda', this)"><i class="fas fa-question-circle"></i> Ajuda</div>
    </div>
</nav>

<main>
    <header>
        <div style="font-weight: 700;">Víctor Soati Ávila Trivinho</div>
        <div style="display:flex; align-items:center; gap:20px;">
            <i class="fas fa-user-circle fa-2x" style="color: #CBD5E0;"></i>
        </div>
    </header>

    <div class="content-area">
        <section id="view-dash" class="section active">
            <h2>Dashboard</h2>
            <div class="grid">
                <div class="card" style="border-left: 6px solid #22C55E;">
                    <div style="color: #718096; font-size: 12px; font-weight: 700;">VENDAS APROVADAS</div>
                    <div id="val-faturamento" style="font-size: 32px; font-weight: 800; margin-top:10px;">R$ 0,00</div>
                </div>
            </div>
        </section>

        <section id="view-prod" class="section">
            <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
                <h2>Meus Produtos</h2>
                <button class="btn-primary" onclick="abrirEditor(null)">+ Criar Produto</button>
            </div>
            <div id="grid-meus-produtos" class="grid"></div>
        </section>

        <section id="view-editor" class="section">
            <button onclick="ver('prod')" style="background:none; border:none; color:var(--orange); font-weight:700; cursor:pointer; margin-bottom:20px;">
                <i class="fas fa-arrow-left"></i> Voltar para lista
            </button>
            <div class="editor-container">
                <div class="editor-header">
                    <div class="editor-tab active" onclick="tabEditor('info', this)">Informações Gerais</div>
                    <div class="editor-tab" onclick="tabEditor('conteudo', this)">Conteúdo (Aulas)</div>
                </div>
                
                <div id="edit-info" class="editor-content">
                    <label>Nome do Produto</label>
                    <input type="text" id="edit-nome" placeholder="Ex: Violão Master">
                    <label>Preço (R$)</label>
                    <input type="number" id="edit-preco" placeholder="197.00">
                    <label>Descrição</label>
                    <textarea id="edit-desc" rows="4"></textarea>
                    <button class="btn-primary" onclick="salvarProduto()">Salvar Alterações</button>
                </div>

                <div id="edit-conteudo" class="editor-content" style="display:none;">
                    <div style="background:#F8F9FA; padding:20px; border-radius:10px; margin-bottom:20px;">
                        <h4>Adicionar Nova Aula</h4>
                        <input type="text" id="aula-titulo" placeholder="Título da Aula">
                        <input type="text" id="aula-link" placeholder="URL do Vídeo (YouTube)">
                        <button class="btn-primary" onclick="addAula()">+ Adicionar Aula</button>
                    </div>
                    <div id="lista-aulas-editor"></div>
                </div>
            </div>
        </section>
    </div>
</main>

<script>
    let idAtivo = null;

    function ver(abaId, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById('view-' + abaId).classList.add('active');
        if(el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }
        if(abaId === 'prod') carregarProdutos();
    }

    function tabEditor(tab, el) {
        document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('edit-info').style.display = tab === 'info' ? 'block' : 'none';
        document.getElementById('edit-conteudo').style.display = tab === 'conteudo' ? 'block' : 'none';
        if(tab === 'conteudo') carregarAulasEditor();
    }

    async function abrirEditor(id) {
        idAtivo = id;
        ver('editor');
        if(id) {
            const { data } = await _supabase.from('cursos_disponiveis').select('*').eq('id', id).single();
            document.getElementById('edit-nome').value = data.nome;
            document.getElementById('edit-preco').value = data.preco;
            document.getElementById('edit-desc').value = data.descricao;
        } else {
            document.getElementById('edit-nome').value = '';
            document.getElementById('edit-preco').value = '';
            document.getElementById('edit-desc').value = '';
        }
    }

    async function carregarProdutos() {
        const { data } = await _supabase.from('cursos_disponiveis').select('*');
        document.getElementById('grid-meus-produtos').innerHTML = data.map(c => `
            <div class="card">
                <h3>${c.nome}</h3>
                <div style="color:var(--orange); font-weight:800; margin-bottom:15px;">R$ ${c.preco}</div>
                <button class="btn-primary" style="width:100%; justify-content:center;" onclick="abrirEditor(${c.id})">Gerenciar Produto</button>
            </div>
        `).join('');
    }

    async function salvarProduto() {
        const p = { nome: document.getElementById('edit-nome').value, preco: document.getElementById('edit-preco').value, descricao: document.getElementById('edit-desc').value };
        if(idAtivo) {
            await _supabase.from('cursos_disponiveis').update(p).eq('id', idAtivo);
        } else {
            const { data } = await _supabase.from('cursos_disponiveis').insert([p]).select();
            idAtivo = data[0].id;
        }
        alert("Salvo com sucesso!");
    }

    async function carregarAulasEditor() {
        const { data } = await _supabase.from('aulas').select('*').eq('curso_id', idAtivo);
        document.getElementById('lista-aulas-editor').innerHTML = data.map(a => `
            <div style="padding:15px; border-bottom:1px solid #EEE; display:flex; justify-content:space-between;">
                <span><i class="fas fa-video"></i> ${a.titulo}</span>
                <i class="fas fa-trash" style="color:red; cursor:pointer;" onclick="deletarAula(${a.id})"></i>
            </div>
        `).join('');
    }

    async function addAula() {
        const a = { curso_id: idAtivo, titulo: document.getElementById('aula-titulo').value, video_url: document.getElementById('aula-link').value };
        await _supabase.from('aulas').insert([a]);
        carregarAulasEditor();
    }

    carregarProdutos();
</script>
</body>
</html>
