<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout PIX</title>

<style>
body{
    background:#0f1117;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#181c25;
    padding:30px;
    border-radius:20px;
    width:400px;
    text-align:center;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#ff6b00;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:15px;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin-bottom:10px;
    background:#0f1117;
    color:white;
}

img{
    margin-top:20px;
    width:220px;
}

.pix{
    background:#0f1117;
    padding:10px;
    border-radius:10px;
    margin-top:15px;
    word-break:break-all;
    font-size:12px;
}
</style>
</head>
<body>

<div class="card">

<h1>Pagamento PIX</h1>

<input type="email" id="email" placeholder="Seu e-mail">

<button onclick="gerarPix()">
Gerar PIX
</button>

<div id="resultado"></div>

</div>

<script>

async function gerarPix(){

    const response = await fetch(
        "https://onsbuazkqfehkudhladt.supabase.co/functions/v1/create-payment",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "Authorization":"Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uc2J1YXprcWZlaGt1ZGhsYWR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNTI5OTgsImV4cCI6MjA5MzkyODk5OH0.ZypL6LHbPC_z971EDCTh6pVoA7g4qM6hWSWfWVO9a-M"
            },
            body:JSON.stringify({
                amount:10,
                description:"Curso Teste",
                email:document.getElementById("email").value
            })
        }
    );

    const data = await response.json();

    document.getElementById("resultado").innerHTML = `
    
        <img src="data:image/png;base64,${data.qr_code_base64}" />

        <div class="pix">
            ${data.qr_code}
        </div>

        <button onclick="copiarPix('${data.qr_code}')">
            Copiar PIX
        </button>

        <a href="${data.ticket_url}" target="_blank">
            <button>
                Abrir pagamento
            </button>
        </a>
    `;
}

function copiarPix(texto){
    navigator.clipboard.writeText(texto);
    alert("PIX copiado!");
}

</script>

</body>
</html>
