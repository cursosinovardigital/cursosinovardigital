<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Aluno | Inovar Digital Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --orange: #FF6600; --deep-black: #050608; --card-bg: #0F1216; 
            --white: #FFFFFF; --text-dim: #94A3B8; --border: #1E293B;
            --success: #22C55E;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.2s ease; }
        body { margin: 0; background: var(--deep-black); color: var(--white); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        header { 
            height: 70px; background: rgba(5, 6, 8, 0.95); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; 
            align-items: center; padding: 0 40px; flex-shrink: 0; z-index: 100;
        }
        .logo { font-size: 18px; font-weight: 900; letter-spacing: -1px; text-decoration: none; color: white; }
        .logo span { color: var(--orange); }

        .header-actions { display: flex; align-items: center; gap: 20px; }
        .btn-exit { background: transparent; border: 1px solid var(--border); color: white; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 700; text-decoration: none; }
        .btn-exit:hover { border-color: var(--orange); color: var(--orange); }

        main { display: flex; flex: 1; overflow: hidden; }

        /* AREA DO PLAYER */
        .video-container { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top left, #111418 0%, #050608 100%); }
        .player-wrapper { 
            width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 24px; 
            overflow: hidden; border: 1px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }
        .player-wrapper iframe, .player-wrapper video { width: 100%; height: 100%; border: none; }

        .lesson-header { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 40px; }
        .lesson-category { color: var(--orange); font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; display: block; }
        .lesson-title { font-size: 32px; font-weight: 800; margin: 0; }
        
        .btn-complete { 
            background: rgba(255,255,255,0.05); color: var(--white); border: 1px solid var(--border);
            padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; gap: 10px;
        }
        .btn-complete.done { background: var(--success); border-color: var(--success); }
        .btn-complete:hover { transform: scale(1.05); }

        .lesson-desc { color: var(--text-dim); line-height: 1.8; font-size: 16px; max-width: 900px; margin-top: 20px; }

        /* MATERIAIS DE APOIO */
        .materials-section { margin-top: 40px; border-top: 1px solid var(--border); padding-top: 30px; }
        .section-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .materials-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .material-item { 
            background: var(--card-bg); border: 1px solid var(--border); padding: 15px; border-radius: 12px;
            display: flex; align-items: center; gap: 15px; text-decoration: none; color: white;
        }
        .material-item:hover { border-color: var(--orange); background: rgba(255,102,0,0.05); }
        .material-icon { width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--orange); }

        /* SIDEBAR */
        .sidebar { width: 420px; background: var(--card-bg); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-header { padding: 30px; border-bottom: 1px solid var(--border); background: #0a0c10; }
        .sidebar-header h3 { margin: 0; font-size: 18px; font-weight: 800; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 15px; }

        .module-group { margin-bottom: 10px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .module-trigger { padding: 18px 20px; background: #161b22; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: 800; font-size: 14px; }
        .module-lessons { background: #080a0c; }

        .lesson-item { display: flex; gap: 15px; padding: 15px 20px; cursor: pointer; border-bottom: 1px solid #111418; align-items: center; }
        .lesson-item:hover { background: rgba(255,255,255,0.03); }
        .lesson-item.active { background: rgba(255, 102, 0, 0.08); border-left: 3px solid var(--orange); }
        
        .lesson-txt { flex: 1; }
        .lesson-name { font-size: 13px; font-weight: 600; color: #E2E8F0; margin-bottom: 4px; }
        .lesson-meta { font-size: 10px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--orange); }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">INOVAR<span>DIGITAL</span> | ALUNO</a>
    <div class="header-actions">
        <div style="text-align: right;">
            <div style="font-size: 13px; font-weight: 800;" id="user-display-name">Carregando...</div>
            <div style="font-size: 10px; color: var(--orange); font-weight: 900;">ACESSO PREMIUM</div>
        </div>
        <a href="portal.html" class="btn-exit">Voltar ao Portal</a>
    </div>
</header>

<main>
    <section class="video-container">
        <div class="player-wrapper" id="player-container">
            <video id="main-player" controls autoplay></video>
        </div>
        
        <div class="lesson-info">
            <div class="lesson-header">
                <div>
                    <span class="lesson-category" id="view-cat">CATEGORIA</span>
                    <h1 class="lesson-title" id="view-title">Inicie sua jornada</h1>
                </div>
                <button class="btn-complete" id="btn-complete" onclick="toggleComplete()">
                    <i class="far fa-check-circle"></i> Concluir Aula
                </button>
            </div>
            <p class="lesson-desc" id="view-desc">Selecione uma aula no menu lateral para começar.</p>
        </div>

        <div class="materials-section" id="materials-area" style="display: none;">
            <div class="section-title"><i class="fas fa-paperclip"></i> Materiais de Apoio</div>
            <div class="materials-grid" id="materials-list">
                </div>
        </div>
    </section>

    <aside class="sidebar">
        <div class="sidebar-header"><h3>Conteúdo do Treinamento</h3></div>
        <div class="sidebar-content" id="module-container"></div>
    </aside>
</main>

<script>
    const SUPABASE_URL = 'https://onsbuazkqfehkudhladt.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uc2J1YXprcWZlaGt1ZGhsYWR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNTI5OTgsImV4cCI6MjA5MzkyODk5OH0.ZypL6LHbPC_z971EDCTh6pVoA7g4qM6hWSWfWVO9a-M';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let aulaAtualId = null;

    async function checarSeguranca() {
        const { data: { user } } = await _supabase.auth.getUser();
        if (!user) { window.location.href = 'index.html'; return; }
        document.getElementById('user-display-name').innerText = user.user_metadata.full_name || user.email.split('@')[0];
        carregarConteudoCurso();
    }

    async function carregarConteudoCurso() {
        const urlParams = new URLSearchParams(window.location.search);
        const aulaId = urlParams.get('aula');

        const { data: aulas, error } = await _supabase.from('aulas').select('*').order('created_at', { ascending: true });
        if (error || !aulas) return;

        const grupos = aulas.reduce((acc, aula) => {
            const modNome = aula.modulo || 'Início';
            if (!acc[modNome]) acc[modNome] = [];
            acc[modNome].push(aula);
            return acc;
        }, {});

        renderizarModulos(grupos);

        // Auto-play na aula da URL ou na primeira
        const aulaParaIniciar = aulaId ? aulas.find(a => a.id == aulaId) : aulas[0];
        if (aulaParaIniciar) {
            assistir(aulaParaIniciar.video_url, aulaParaIniciar.titulo, aulaParaIniciar.descricao, aulaParaIniciar.categoria, aulaParaIniciar.id, aulaParaIniciar.material_url);
        }
    }

    function renderizarModulos(grupos) {
        const container = document.getElementById('module-container');
        container.innerHTML = Object.keys(grupos).map((modNome, index) => `
            <div class="module-group">
                <div class="module-trigger" onclick="toggleModule('mod-${index}')">
                    <span>${modNome}</span><i class="fas fa-chevron-down"></i>
                </div>
                <div class="module-lessons" id="mod-${index}">
                    ${grupos[modNome].map(a => `
                        <div class="lesson-item" id="item-${a.id}" onclick="assistir('${a.video_url}', '${a.titulo}', '${a.descricao}', '${a.categoria}', '${a.id}', '${a.material_url}')">
                            <i class="fas fa-play-circle" style="color:var(--text-dim)"></i>
                            <div class="lesson-txt">
                                <div class="lesson-name">${a.titulo}</div>
                                <div class="lesson-meta">Aula</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
    }

    function assistir(url, titulo, desc, cat, id, material) {
        aulaAtualId = id;
        const wrapper = document.getElementById('player-container');
        
        // Setup Player
        if (url.includes('youtube') || url.includes('youtu.be')) {
            const embed = url.includes('watch?v=') ? url.replace('watch?v=', 'embed/') : url.replace('youtu.be/', 'youtube.com/embed/');
            wrapper.innerHTML = `<iframe src="${embed}?autoplay=1" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
        } else {
            wrapper.innerHTML = `<video src="${url}" controls autoplay controlsList="nodownload"></video>`;
        }

        document.getElementById('view-title').innerText = titulo;
        document.getElementById('view-desc').innerText = desc || 'Aproveite sua aula!';
        document.getElementById('view-cat').innerText = cat || 'Geral';

        // Reset Botão Concluir
        const btn = document.getElementById('btn-complete');
        btn.classList.remove('done');
        btn.innerHTML = `<i class="far fa-check-circle"></i> Concluir Aula`;

        // Materiais
        const matArea = document.getElementById('materials-area');
        if (material) {
            matArea.style.display = 'block';
            document.getElementById('materials-list').innerHTML = `
                <a href="${material}" target="_blank" class="material-item">
                    <div class="material-icon"><i class="fas fa-file-pdf"></i></div>
                    <div class="material-txt"><strong>Material de Apoio</strong><br><small>Clique para baixar</small></div>
                </a>
            `;
        } else { matArea.style.display = 'none'; }

        document.querySelectorAll('.lesson-item').forEach(i => i.classList.remove('active'));
        document.getElementById('item-' + id)?.classList.add('active');
    }

    function toggleComplete() {
        const btn = document.getElementById('btn-complete');
        btn.classList.toggle('done');
        const isDone = btn.classList.contains('done');
        btn.innerHTML = isDone ? `<i class="fas fa-check-circle"></i> Aula Concluída` : `<i class="far fa-check-circle"></i> Concluir Aula`;
        if(isDone) confetti(); // Se quiser adicionar um efeito de festa depois
    }

    function toggleModule(id) {
        const el = document.getElementById(id);
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
    }

    window.onload = checarSeguranca;
</script>
</body>
</html>
