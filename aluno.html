<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do Aluno | Inovar Digital</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --orange: #FF6600; --deep-black: #050608; --card-bg: #0F1216; 
            --white: #FFFFFF; --text-dim: #94A3B8; --border: #1E293B;
            --glow: rgba(255, 102, 0, 0.3);
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.2s ease; }
        body { margin: 0; background: var(--deep-black); color: var(--white); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* HEADER DARK */
        header { 
            height: 70px; background: rgba(5, 6, 8, 0.95); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; 
            align-items: center; padding: 0 40px; flex-shrink: 0; z-index: 100;
        }
        .logo { font-size: 18px; font-weight: 900; letter-spacing: -1px; text-decoration: none; color: white; }
        .logo span { color: var(--orange); }

        .btn-exit { background: transparent; border: 1px solid var(--border); color: white; padding: 8px 16px; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 700; }
        .btn-exit:hover { border-color: var(--orange); color: var(--orange); }

        /* LAYOUT */
        main { display: flex; flex: 1; overflow: hidden; }

        /* PLAYER */
        .video-container { flex: 1; padding: 40px; overflow-y: auto; background: radial-gradient(circle at top left, #111418 0%, #050608 100%); }
        .player-wrapper { 
            width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 24px; 
            overflow: hidden; border: 1px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.6);
        }
        .player-wrapper video { width: 100%; height: 100%; object-fit: contain; }

        .lesson-info { margin-top: 40px; }
        .lesson-category { color: var(--orange); font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; display: block; }
        .lesson-title { font-size: 32px; font-weight: 800; margin-bottom: 20px; }
        .lesson-desc { color: var(--text-dim); line-height: 1.8; font-size: 16px; max-width: 1000px; }

        /* SIDEBAR DE MÓDULOS */
        .sidebar { 
            width: 420px; background: var(--card-bg); border-left: 1px solid var(--border); 
            display: flex; flex-direction: column; overflow: hidden;
        }
        .sidebar-header { padding: 30px; border-bottom: 1px solid var(--border); background: #0a0c10; }
        .sidebar-header h3 { margin: 0; font-size: 18px; font-weight: 800; }
        
        .sidebar-content { flex: 1; overflow-y: auto; padding: 15px; }

        /* ESTILO DOS MÓDULOS (ACCORDION) */
        .module-group { margin-bottom: 10px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .module-trigger { 
            padding: 18px 20px; background: #161b22; display: flex; justify-content: space-between; 
            align-items: center; cursor: pointer; font-weight: 800; font-size: 14px;
        }
        .module-trigger:hover { background: #1c2128; }
        .module-trigger i { color: var(--orange); font-size: 12px; }

        .module-lessons { background: #080a0c; }

        /* AULA ITEM */
        .lesson-item { 
            display: flex; gap: 15px; padding: 15px 20px; cursor: pointer; 
            border-bottom: 1px solid #111418; align-items: center;
        }
        .lesson-item:hover { background: rgba(255,255,255,0.03); }
        .lesson-item.active { background: rgba(255, 102, 0, 0.08); border-left: 3px solid var(--orange); }
        
        .lesson-icon { color: var(--text-dim); font-size: 18px; width: 30px; text-align: center; }
        .lesson-item.active .lesson-icon { color: var(--orange); }
        
        .lesson-txt { flex: 1; }
        .lesson-name { font-size: 13px; font-weight: 600; color: #E2E8F0; margin-bottom: 4px; }
        .lesson-meta { font-size: 10px; color: var(--text-dim); font-weight: 700; text-transform: uppercase; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--orange); }

    </style>
</head>
<body>

<header>
    <a href="#" class="logo">INOVAR<span>DIGITAL</span> | ALUNO</a>
    <div style="display: flex; align-items: center; gap: 20px;">
        <div style="text-align: right;">
            <div style="font-size: 13px; font-weight: 800;" id="user-display-name">Carregando...</div>
            <div style="font-size: 10px; color: var(--orange); font-weight: 900;">ACESSO PREMIUM</div>
        </div>
        <button class="btn-exit" onclick="window.location.href='portal.html'">Voltar ao Portal</button>
    </div>
</header>

<main id="main-content">
    <section class="video-container">
        <div class="player-wrapper">
            <video id="main-player" controls autoplay controlsList="nodownload"></video>
        </div>
        
        <div class="lesson-info">
            <span class="lesson-category" id="view-cat">CATEGORIA</span>
            <h1 class="lesson-title" id="view-title">Selecione uma aula para começar</h1>
            <p class="lesson-desc" id="view-desc">
                Bem-vindo ao seu portal de aprendizado. Utilize o menu lateral para navegar entre os módulos e aulas disponíveis.
            </p>
        </div>
    </section>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h3>Conteúdo do Treinamento</h3>
        </div>
        <div class="sidebar-content" id="module-container">
            <p style="padding:20px; color:var(--text-dim); font-size:12px;">Carregando sua jornada...</p>
        </div>
    </aside>
</main>

<script>
    const SUPABASE_URL = 'https://onsbuazkqfehkudhladt.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uc2J1YXprcWZlaGt1ZGhsYWR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNTI5OTgsImV4cCI6MjA5MzkyODk5OH0.ZypL6LHbPC_z971EDCTh6pVoA7g4qM6hWSWfWVO9a-M';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function checarSeguranca() {
        const { data: { user } } = await _supabase.auth.getUser();

        if (!matricula || matricula.length === 0) {
             document.getElementById('main-content').innerHTML = `

                    <i class="fas fa-lock fa-5x" style="color:var(--orange); margin-bottom:30px; filter: drop-shadow(0 0 20px rgba(255,102,0,0.4))"></i>
                    <h1 style="font-size:38px; font-weight:900;">Acesso Bloqueado</h1>
                    <p style="color:var(--text-dim); max-width:500px; line-height:1.6; margin-top:10px;">Você ainda não possui uma licença ativa para este curso. Adquira no marketplace para liberar seu aprendizado.</p>

                </div>
             `;
             return;
        }
        */

        // Se estiver tudo OK, inicia o conteúdo
        init();

    async function init() {
        const { data: aulas, error } = await _supabase
            .from('aulas')
            .select('*')
            .order('created_at', { ascending: true });

        if (aulas && aulas.length > 0) {
            const grupos = aulas.reduce((acc, aula) => {
                const modNome = aula.modulo || 'Módulo Geral';
                if (!acc[modNome]) acc[modNome] = [];
                acc[modNome].push(aula);
                return acc;
            }, {});

            renderizarModulos(grupos);
            const primeiraAula = aulas[0];
            assistir(primeiraAula.video_url, primeiraAula.titulo, primeiraAula.descricao, primeiraAula.categoria, primeiraAula.id);
        } else {
            document.getElementById('module-container').innerHTML = `<p style="padding:20px; color:var(--text-dim); font-size:12px;">Nenhuma aula cadastrada ainda.</p>`;
        }
    }

    function renderizarModulos(grupos) {
        const container = document.getElementById('module-container');
        container.innerHTML = '';
        Object.keys(grupos).forEach((modNome, index) => {
            const aulas = grupos[modNome];
            const modHtml = `
                <div class="module-group">
                    <div class="module-trigger" onclick="toggleModule('mod-${index}')">
                        <span>${modNome}</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="module-lessons" id="mod-${index}">
                        ${aulas.map(a => `
                            <div class="lesson-item" id="item-${a.id}" onclick="assistir('${a.video_url}', '${a.titulo}', '${a.descricao}', '${a.categoria}', ${a.id})">
                                <div class="lesson-icon"><i class="fas fa-play-circle"></i></div>
                                <div class="lesson-txt">
                                    <div class="lesson-name">${a.titulo}</div>
                                    <div class="lesson-meta">Videoaula</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            container.innerHTML += modHtml;
        });
    }

    function toggleModule(id) {
        const div = document.getElementById(id);
        div.style.display = div.style.display === 'none' ? 'block' : 'none';
    }

    function assistir(url, titulo, desc, cat, id) {
        const player = document.getElementById('main-player');
        player.src = url;
        player.play();
        document.getElementById('view-title').innerText = titulo;
        document.getElementById('view-desc').innerText = desc || 'Sem descrição.';
        document.getElementById('view-cat').innerText = cat || 'Geral';
        document.querySelectorAll('.lesson-item').forEach(i => i.classList.remove('active'));
        const activeItem = document.getElementById('item-' + id);
        if(activeItem) activeItem.classList.add('active');
    }

    // Inicia pela checagem de segurança

<script>
    const SUPABASE_URL = 'https://onsbuazkqfehkudhladt.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9uc2J1YXprcWZlaGt1ZGhsYWR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzNTI5OTgsImV4cCI6MjA5MzkyODk5OH0.ZypL6LHbPC_z971EDCTh6pVoA7g4qM6hWSWfWVO9a-M';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function carregarConteudoCurso() {
        // 1. Pega o ID do curso que veio lá da vitrine (pela URL)
        const urlParams = new URLSearchParams(window.location.search);
        const cursoId = urlParams.get('id');

        if (!cursoId) {
            console.error("ID do curso não encontrado na URL");
            return;
        }

        // 2. Busca os detalhes desse curso no banco (tabela aulas)
        const { data: curso, error } = await _supabase
            .from('aulas')
            .select('*')
            .eq('id', cursoId)
            .single();

        if (error || !curso) {
            alert("Curso não encontrado!");
            return;
        }

        // 3. Atualiza o título e o vídeo na tela do aluno
        // (Estou usando os IDs padrões que costumamos usar no visual)
        const tituloElemento = document.getElementById('aula-titulo-principal');
        const videoContainer = document.getElementById('video-placeholder');

        if (tituloElemento) tituloElemento.innerText = curso.titulo;
        
        // Se você tiver uma coluna 'video_url' na tabela 'aulas', aqui ele troca o vídeo:
        if (videoContainer && curso.video_url) {
            videoContainer.innerHTML = `<iframe width="100%" height="100%" src="${curso.video_url}" frameborder="0" allowfullscreen></iframe>`;
        }
    }

    // Carrega tudo assim que a página abrir
    window.onload = async function() {
        // 1. Primeiro garante que a segurança rode
        if (typeof checarSeguranca === "function") {
            await checarSeguranca(); 
        }
        // 2. Depois carrega o conteúdo do curso dinâmico
        carregarConteudoCurso(); 
    };
</script>

</body>
</html>
